<style>
  /* ===================================================================
     CSS Variables — Five Element Color System
     =================================================================== */
  :root {
    --mu:    #4CAF50;   /* 木 — green */
    --mu-bg: #E8F5E9;
    --huo:   #F44336;   /* 火 — red */
    --huo-bg:#FFEBEE;
    --tu:    #8C7B68;   /* 土 — 灰褐色 */
    --tu-bg: #F1EEEA;
    --jin:   #F0B830;   /* 金 — 橙黄色 */
    --jin-bg:#FFF9F0;
    --jin-dark: #D49810;
    --shui:  #2196F3;   /* 水 — blue */
    --shui-bg:#E3F2FD;

    --text:      #212121;
    --text-muted:#757575;
    --border:    #E0E0E0;
    --bg:        #FAFAFA;
    --card-bg:   #FFFFFF;
    --radius:    8px;
    --shadow:    0 1px 3px rgba(0,0,0,.08);
    --font:      "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  }

  /* ===================================================================
     Reset & Base
     =================================================================== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    line-height: 1.7;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 860px; margin: 0 auto; padding: 20px 24px 80px; }

  /* ===================================================================
     Element color utility classes
     =================================================================== */
  .em-木 { color: var(--mu); }
  .em-火 { color: var(--huo); }
  .em-土 { color: var(--tu); }
  .em-金 { color: var(--jin-dark); }
  .em-水 { color: var(--shui); }

  .badge-木 { background: var(--mu); color: #fff; }
  .badge-火 { background: var(--huo); color: #fff; }
  .badge-土 { background: var(--tu); color: #fff; }
  .badge-金 { background: var(--jin); color: #333; }
  .badge-水 { background: var(--shui); color: #fff; }

  .bg-木 { background: var(--mu-bg); }
  .bg-火 { background: var(--huo-bg); }
  .bg-土 { background: var(--tu-bg); }
  .bg-金 { background: var(--jin-bg); }
  .bg-水 { background: var(--shui-bg); }

  /* ===================================================================
     Header
     =================================================================== */
  .report-header {
    text-align: center;
    padding: 48px 24px 40px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 32px;
  }
  .report-header h1 {
    font-size: 28px;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }
  .report-header .subtitle {
    color: var(--text-muted);
    font-size: 14px;
  }
  .report-header .birth-info {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px 24px;
    margin-top: 16px;
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ===================================================================
     Section titles
     =================================================================== */
  section { margin-bottom: 36px; }
  .section-title {
    font-size: 20px;
    font-weight: 700;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 16px;
    letter-spacing: 2px;
  }
  .section-title .num {
    display: inline-block;
    width: 32px; height: 32px;
    line-height: 32px;
    text-align: center;
    border-radius: 50%;
    background: var(--text);
    color: #fff;
    font-size: 14px;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* ===================================================================
     Four Pillars Display
     =================================================================== */
  .pillars-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  .pillar-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    text-align: center;
  }
  .pillar-card .pillar-label {
    font-size: 12px;
    color: var(--text-muted);
    padding: 10px 0 4px;
    letter-spacing: 2px;
  }
  /* 天干区 */
  .pillar-card .stem-section {
    padding: 2px 10px 8px;
  }
  .pillar-card .stem-char {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.3;
  }
  .pillar-card .stem-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 2px;
  }
  .pillar-card .card-tg {
    font-size: 11px;
    color: var(--text-muted);
  }
  .pillar-card .card-divider {
    height: 1px;
    background: var(--border);
    margin: 0 14px;
  }
  /* 地支区 */
  .pillar-card .branch-section {
    padding: 6px 10px 10px;
  }
  .pillar-card .branch-char {
    font-size: 26px;
    font-weight: 400;
    line-height: 1.3;
  }
  .pillar-card .branch-meta {
    margin: 2px 0 4px;
  }
  .pillar-card .hidden-stems {
    font-size: 11px;
    line-height: 2;
    color: var(--text-muted);
  }
  .pillar-card .hidden-stems .h-stem {
    font-weight: 600;
  }
  .pillar-card .hidden-stems .h-tg {
    color: #aaa;
    font-size: 10px;
    margin-left: 1px;
  }

  /* ===================================================================
     Day Master Highlight Box
     =================================================================== */
  .dm-box {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    border-radius: var(--radius);
    margin: 20px 0;
  }
  .dm-box .dm-stem {
    font-size: 40px;
    font-weight: 700;
  }
  .dm-box .dm-detail {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.8;
  }
  .dm-box .dm-detail strong { color: var(--text); }

  /* ===================================================================
     Element Distribution
     =================================================================== */
  .element-bars { margin: 16px 0; }
  .element-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .element-bar .el-label {
    width: 24px;
    font-weight: 700;
    text-align: center;
  }
  .element-bar .bar-track {
    flex: 1;
    height: 20px;
    background: #F5F5F5;
    border-radius: 10px;
    overflow: hidden;
  }
  .element-bar .bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width .4s;
    min-width: 16px;
  }
  .element-bar .bar-fill.mu-bar { background: var(--mu); }
  .element-bar .bar-fill.huo-bar{ background: var(--huo); }
  .element-bar .bar-fill.tu-bar { background: var(--tu); }
  .element-bar .bar-fill.jin-bar{ background: var(--jin); }
  .element-bar .bar-fill.shui-bar{background: var(--shui); }
  .element-bar .bar-count {
    width: 20px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
  }

  /* ===================================================================
     Badges / Tags
     =================================================================== */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .badge-group { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }

  /* ===================================================================
     Info Cards
     =================================================================== */
  .info-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .info-card h3 {
    font-size: 16px;
    margin-bottom: 12px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .info-card p { font-size: 15px; color: #555; line-height: 1.9; }
  .info-card ul { margin: 8px 0 0 20px; font-size: 15px; color: #555; }
  .info-card ul li { margin-bottom: 4px; }
  .info-card .highlight {
    background: #FFF9C4;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }

  /* ===================================================================
     Strength Meter
     =================================================================== */
  .strength-meter {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
  }
  .strength-label { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .strength-label.weak { color: var(--shui); }
  .strength-label.strong{ color: var(--huo); }
  .meter-track {
    flex: 1;
    height: 10px;
    background: linear-gradient(to right, var(--shui), #E0E0E0 40%, #E0E0E0 60%, var(--huo));
    border-radius: 5px;
    position: relative;
  }
  .meter-dot {
    position: absolute;
    top: -5px;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px var(--text);
    background: var(--text);
    transform: translateX(-50%);
  }

  /* ===================================================================
     Interaction list
     =================================================================== */
  .interaction-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    margin: 4px;
  }
  .interaction-item.he   { background: #E8F5E9; color: #2E7D32; }
  .interaction-item.chong{ background: #FFEBEE; color: #C62828; }
  .interaction-item.xing { background: #FFF3E0; color: #E65100; }
  .interaction-item.hai  { background: #F3E5F5; color: #7B1FA2; }

  /* ===================================================================
     Da Yun Table
     =================================================================== */
  .dayun-table-wrap {
    overflow-x: auto;
    margin: 16px 0;
  }
  .dayun-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .dayun-table thead th {
    background: #F5F5F5;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 1px;
    white-space: nowrap;
    border-bottom: 2px solid var(--border);
  }
  .dayun-table tbody td {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.7;
  }
  .dayun-table tbody tr.current {
    background: #FFFBF5;
  }
  .dayun-table tbody tr.current td:first-child {
    border-left: 3px solid var(--huo);
  }
  .dayun-table .pillar-cell {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    white-space: nowrap;
  }
  .dayun-table .age-cell {
    white-space: nowrap;
    font-weight: 600;
  }
  .dayun-table .analysis-cell {
    color: #555;
    font-size: 13px;
    min-width: 180px;
  }
  .dayun-table .tag-current {
    display: inline-block;
    background: var(--huo);
    color: #fff;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin-left: 6px;
  }
  .dayun-table .branch-tg {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .dayun-table .branch-tg .badge {
    font-size: 10px;
    padding: 1px 6px;
  }

  /* ===================================================================
     Flow Year Cards
     =================================================================== */
  .liunian-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin: 12px 0;
  }
  .liunian-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    text-align: center;
  }
  .liunian-card .year { font-size: 14px; color: var(--text-muted); margin-bottom: 4px; }
  .liunian-card .ln-pillar { font-size: 24px; font-weight: 700; letter-spacing: 2px; }

  /* ===================================================================
     Pattern Summary
     =================================================================== */
  .pattern-box {
    background: linear-gradient(135deg, #FFFDE7, #FFF8E1);
    border-left: 4px solid var(--tu);
    padding: 18px 24px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin-top: 16px;
  }
  .pattern-box h3 {
    font-size: 15px;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .pattern-box .pattern-tag {
    display: inline-block;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    margin: 4px 6px 4px 0;
    font-size: 13px;
  }
  .pattern-box .pattern-tag strong {
    margin-right: 4px;
  }

  /* ===================================================================
     Historical Figure Match
     =================================================================== */
  .figure-card {
    background: linear-gradient(135deg, #F3E5F5, #EDE7F6);
    border-radius: var(--radius);
    padding: 28px 24px;
    margin: 16px 0;
    text-align: center;
  }
  .figure-card .figure-name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }
  .figure-card .figure-dynasty {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .figure-card .figure-match {
    font-size: 14px;
    color: #555;
    line-height: 2;
    text-align: left;
  }
  .figure-card .figure-match ul {
    margin: 6px 0 0 20px;
  }
  .figure-card .figure-match ul li {
    margin-bottom: 4px;
  }

  /* ===================================================================
     Disclaimer
     =================================================================== */
  .disclaimer {
    background: #FFF9C4;
    border-left: 4px solid var(--tu);
    padding: 20px 24px;
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 13px;
    color: #6D4C41;
    line-height: 1.9;
  }
  .disclaimer strong { display: block; margin-bottom: 8px; font-size: 15px; }

  /* ===================================================================
     Responsive
     =================================================================== */
  @media (max-width: 640px) {
    .pillars-grid { grid-template-columns: repeat(2, 1fr); }
    .liunian-grid { grid-template-columns: repeat(2, 1fr); }
    .report-header h1 { font-size: 22px; }
    .pillar-card .stem { font-size: 28px; }
  }

  /* ===================================================================
     Print
     =================================================================== */
  @media print {
    body { background: #fff; }
    .container { max-width: 100%; padding: 0; }
    .info-card, .pillar-card, .liunian-card { box-shadow: none; border: 1px solid #ddd; }
    section { page-break-inside: avoid; }
  }
</style>
</head>
